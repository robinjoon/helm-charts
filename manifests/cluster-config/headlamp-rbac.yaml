# Read-only ClusterRole used by the Headlamp pod's ServiceAccount
# (the chart binds headlamp's SA to this via clusterRoleBinding.clusterRoleName).
# get/list/watch across the cluster — read-only.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: headlamp-readonly
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["*"]
    verbs: ["get"]
