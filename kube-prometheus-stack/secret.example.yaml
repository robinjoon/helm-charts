apiVersion: v1
kind: Secret
metadata:
  name: kube-prometheus-stack-grafana-admin
  namespace: monitoring
type: Opaque
stringData:
  admin-user: admin
  admin-password: change-me
---
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-kube-prometheus-stack-alertmanager
  namespace: monitoring
type: Opaque
stringData:
  alertmanager.yaml: |-
    global:
      resolve_timeout: 5m

    route:
      receiver: discord-default
      group_by:
        - cluster
        - alertname
        - namespace
        - job
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      routes:
        - receiver: "null"
          matchers:
            - alertname = "Watchdog"

    receivers:
      - name: "null"
      - name: discord-default
        discord_configs:
          - webhook_url: https://discord.com/api/webhooks/CHANGE_ME/CHANGE_ME
            send_resolved: true
            title: '{{ template "discord.default.title" . }}'
            message: '{{ template "discord.default.message" . }}'

    templates:
      - /etc/alertmanager/config/*.tmpl
---
apiVersion: v1
kind: Secret
metadata:
  name: kube-prometheus-stack-additional-scrape-configs
  namespace: monitoring
type: Opaque
stringData:
  additional-scrape-configs.yaml: |-
    - job_name: external-prometheus-target-1
      scheme: https
      metrics_path: /metrics
      scrape_interval: 30s
      basic_auth:
        username: example-user-1
        password: example-password-1
      static_configs:
        - targets:
            - metrics-1.example.com:443
          labels:
            site: homelab
            env: prod
            role: external
            owner: robinjoon

    - job_name: external-prometheus-target-2
      scheme: https
      metrics_path: /metrics
      scrape_interval: 30s
      basic_auth:
        username: example-user-2
        password: example-password-2
      static_configs:
        - targets:
            - metrics-2.example.com:443
          labels:
            site: homelab
            env: prod
            role: external
            owner: robinjoon
