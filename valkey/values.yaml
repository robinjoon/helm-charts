# Homelab Valkey — values passed to the official valkey-io chart
# (dependency name: valkey, so everything lives under the `valkey:` key).
#
# - standalone single instance (Deployment, replicas 1)
# - AOF persistence: every write is appended to a log on a PVC (/data) and
#   replayed on restart, so the dataset survives pod restarts
# - ACL auth: the `default` user's password comes from an out-of-band Secret
#   `valkey-acl` (key `default`), created with kubectl — never in Git

valkey:
  # Persistent volume for the data dir (/data) — holds the AOF/RDB files.
  dataStorage:
    enabled: true
    requestedSize: 2Gi
    className: local-path # k3s default StorageClass
    accessModes:
      - ReadWriteOnce

  # Appended to valkey.conf. `appendonly yes` enables AOF so the dataset is
  # rebuilt from the write log after a restart.
  valkeyConfig: |
    appendonly yes
    appendfsync everysec
    dir /data

  # ACL authentication. Password is read from Secret `valkey-acl`
  # (key defaults to the username, i.e. `default`). Not stored in Git.
  auth:
    enabled: true
    usersExistingSecret: valkey-acl
    aclUsers:
      default:
        permissions: "~* &* +@all"

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi
