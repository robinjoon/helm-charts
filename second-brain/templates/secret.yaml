{{- if and .Values.secretRefs.create (not .Values.secretRefs.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "second-brain.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "second-brain.labels" . | nindent 4 }}
type: Opaque
stringData:
{{- range $key, $value := .Values.secretRefs.env }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
{{- end }}

