{{- if and .Values.aiProxy.enabled (eq .Values.aiProxy.mode "external") }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "second-brain.aiProxyServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "second-brain.labels" . | nindent 4 }}
    app.kubernetes.io/component: ai-proxy
  {{- with .Values.aiProxy.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.aiProxy.service.type }}
  ports:
    - name: http
      port: {{ .Values.aiProxy.service.port }}
      targetPort: http
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: {{ include "second-brain.aiProxyServiceName" . }}-1
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "second-brain.labels" . | nindent 4 }}
    app.kubernetes.io/component: ai-proxy
    kubernetes.io/service-name: {{ include "second-brain.aiProxyServiceName" . }}
    endpointslice.kubernetes.io/managed-by: Helm
addressType: {{ .Values.aiProxy.external.addressType }}
ports:
  - name: http
    port: {{ .Values.aiProxy.external.port }}
    protocol: TCP
endpoints:
  {{- range .Values.aiProxy.external.addresses }}
  - addresses:
      - {{ . | quote }}
  {{- end }}
{{- end }}
