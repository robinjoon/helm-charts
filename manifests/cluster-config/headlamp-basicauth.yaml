# Traefik basic-auth gate in front of the Headlamp dashboard.
# The username/password live in Secret `dashboard-basic-auth` (key `users`,
# htpasswd format), created OUT OF BAND with kubectl — NOT in Git.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: dashboard-auth
  namespace: headlamp
spec:
  basicAuth:
    secret: dashboard-basic-auth
