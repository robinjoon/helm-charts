{{- if and .Values.aiProxy.enabled (eq .Values.aiProxy.mode "internal") (not .Values.aiProxy.internal.existingConfigSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "second-brain.aiProxyConfigSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "second-brain.labels" . | nindent 4 }}
    app.kubernetes.io/component: ai-proxy
type: Opaque
stringData:
  {{ .Values.aiProxy.internal.configSecretKey }}: |-
{{ .Values.aiProxy.internal.config | nindent 4 }}
{{- end }}

