image:
  repository: ghcr.io/robinjoon/meeting
  pullPolicy: IfNotPresent
  tag: "sha-2033152"

imagePullSecrets:
  - name: ghcr-pull-secret

admin:
  # 마스터 비밀번호(key: ADMIN_PASSWORD)를 담은 Secret 이름.
  # Secret 은 kubectl 로 직접 만들고 값은 git 에 두지 않는다.
  existingSecret: meeting-admin

nameOverride: ""
fullnameOverride: ""

# 인메모리 저장소라 반드시 단일 레플리카 + Recreate 전략을 유지해야 한다.
replicaCount: 1

podAnnotations: {}
podLabels: {}

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: 10m
    memory: 16Mi
  limits:
    memory: 64Mi

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: traefik
  annotations: {}
  hosts:
    - host: meeting.robinjoon.xyz
      paths:
        - path: /
          pathType: Prefix
  tls: []
